<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Forge — Tiny Tools for Daily Life</title>
<meta name="description" content="Genesis Forge crafts small, focused apps that solve one problem well. Privacy-first, no-account, no-cloud tools.">
<meta name="theme-color" content="#059669">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1a1a1a; background: #fafafa; -webkit-font-smoothing: antialiased; }
  .container { max-width: 720px; margin: 0 auto; padding: 60px 24px; }
  header { margin-bottom: 60px; }
  .brand { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; color: #059669; }
  .tagline { font-size: 16px; color: #666; margin-top: 8px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 16px; font-weight: 600; }
  .app-card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; margin-bottom: 16px; transition: border-color 0.15s, transform 0.15s; }
  .app-card:hover { border-color: #059669; transform: translateY(-1px); }
  .app-name { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .app-desc { color: #555; font-size: 14px; }
  .app-links { margin-top: 14px; font-size: 13px; }
  .app-links a { color: #059669; text-decoration: none; margin-right: 16px; font-weight: 500; }
  .app-links a:hover { text-decoration: underline; }
  footer { margin-top: 100px; padding-top: 24px; border-top: 1px solid #e5e5e5; color: #888; font-size: 13px; }
  footer a { color: #888; text-decoration: none; margin-right: 16px; }
  footer a:hover { color: #059669; }
  @media (prefers-color-scheme: dark) {
    body { background: #0a0a0a; color: #e5e5e5; }
    .app-card { background: #1a1a1a; border-color: #2a2a2a; }
    .tagline, .app-desc { color: #aaa; }
    h2 { color: #888; }
    footer { border-color: #2a2a2a; color: #777; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">Genesis Forge</div>
      <div class="tagline">Crafting tiny tools, one habit at a time.</div>
    </header>

    <h2>Our Apps</h2>

    <div class="app-card">
      <div class="app-name">HabitStreak</div>
      <div class="app-desc">A clean, private daily habit tracker. No accounts, no cloud, no ads. Your streaks stay on your device.</div>
      <div class="app-links">
        <a href="/habitstreak/">Try the web app</a>
        <a href="/privacy/habitstreak.html">Privacy</a>
      </div>
    </div>

    <footer>
      <p>Genesis Forge · An indie tools studio</p>
      <p style="margin-top: 8px;">
        <a href="/privacy/habitstreak.html">Privacy Policies</a>
        <a href="mailto:genesisforge.contact@gmail.com">Contact</a>
      </p>
    </footer>
  </div>
</body>
</html>
